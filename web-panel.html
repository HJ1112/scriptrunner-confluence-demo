<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScriptRunner Banner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #banner {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(90deg, #0052CC, #0065FF);
      color: white;
      padding: 12px 20px;
      border-radius: 4px;
      margin: 8px 0;
    }
    #banner-title { font-weight: 700; font-size: 15px; }
    #banner-subtitle { font-size: 12px; opacity: 0.85; margin-top: 3px; }
    #banner-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="banner">
    <div>
      <div id="banner-title">⚡ Powered by ScriptRunner</div>
      <div id="banner-subtitle">This space is managed and automated using ScriptRunner for Confluence Cloud</div>
    </div>
    <div id="banner-badge">🚀 Automated</div>
  </div>
</body>
</html>
